input {
  tcp {
    port => 5000
    codec => json_lines
  }
}

filter {
  if [service] == "voice-translation" {
    mutate {
      add_field => { "[@metadata][index]" => "voice-translation" }
    }
  }

  date {
    match => [ "timestamp", "ISO8601" ]
  }
}

output {
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "%{[@metadata][index]}-%{+YYYY.MM.dd}"
  }
}
