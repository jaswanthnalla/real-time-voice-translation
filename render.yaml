databases:
  - name: voice-translation-db
    plan: free
    databaseName: voicetranslation
    user: vtuser

  - name: voice-translation-redis
    plan: free

services:
  - type: web
    name: voice-translation
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: node dist/server/index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: DATABASE_URL
        fromDatabase:
          name: voice-translation-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: voice-translation-redis
          type: redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: API_KEY
        generateValue: true
      - key: CORS_ORIGIN
        sync: false
      - key: GOOGLE_CLOUD_PROJECT_ID
        sync: false
      - key: GOOGLE_APPLICATION_CREDENTIALS
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false
      - key: LOG_LEVEL
        value: info
